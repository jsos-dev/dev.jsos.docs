<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #f5f5f5;
  --border: #e5e5e5;
  --text: #1a1a1a;
  --text-secondary: #666;
  --hover-bg: #f0f0f0;
  --dot-color: #999;
}

[data-theme="dark"] {
  --bg: #111;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-secondary: #888;
  --hover-bg: #242424;
  --dot-color: #555;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 12px;
}

.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
  flex-shrink: 0;
}

.logo {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.02em;
}

.nav-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  transition: background 0.15s;
}

.nav-item:hover {
  background: var(--hover-bg);
}

.nav-item:active {
  transform: scale(0.98);
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--dot-color);
  flex-shrink: 0;
}

.label {
  flex: 1;
  font-size: 13px;
  line-height: 1.3;
}

.arrow {
  color: var(--text-secondary);
  font-size: 16px;
  opacity: 0.5;
  flex-shrink: 0;
}

.footer {
  flex-shrink: 0;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  text-align: center;
  font-size: 11px;
  color: var(--text-secondary);
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <img src="/logo.svg" alt="JSOS" class="logo">
    <span class="title">文档导航</span>
  </div>

  <div class="nav-list" id="navList"></div>

  <div class="footer">JSOS Docs</div>
</div>

<script>
const pages = [
  { label: '概览', href: '/docs/' },
  { label: '快速入门', href: '/docs/guide/quickstart' },
  { label: 'GUI 应用开发', href: '/docs/development/gui-apps' },
  { label: 'CLI 应用开发', href: '/docs/development/cli-apps' },
  { label: 'JSOS API 参考', href: '/docs/reference/jsos-api' },
  { label: '应用打包', href: '/docs/packaging/packaging-guide' },
  { label: '小组件开发', href: '/docs/development/widget-guide' },
];

const navList = document.getElementById('navList');

pages.forEach(function(page) {
  var item = document.createElement('a');
  item.className = 'nav-item';
  item.href = '#';

  item.innerHTML = '<span class="dot"></span><span class="label">' + page.label + '</span><span class="arrow">›</span>';

  item.addEventListener('click', function(e) {
    e.preventDefault();
    if (window.JSOS && window.JSOS.openApp) {
      window.JSOS.openApp('dev.jsos.docs', { route: page.href });
    }
  });

  navList.appendChild(item);
});

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

if (window.JSOS) {
  window.JSOS.getTheme().then(applyTheme);
  if (window.JSOS.onThemeChange) {
    window.JSOS.onThemeChange(applyTheme);
  }
}
</script>
</body>
</html>
